name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: reipa

      - name: Build
        working-directory: reipa
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p reipa -p reipa-bench -p reipa-gui

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          name="reipa-${GITHUB_REF_NAME}-${{ matrix.target }}"
          bin="reipa/target/${{ matrix.target }}/release"
          mkdir "$name"
          cp "$bin/reipa" "$bin/reipa-bench" "$bin/reipa-gui" README.md "$name"/
          tar czf "$name.tar.gz" "$name"
          echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "reipa-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          $bin = "reipa/target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "$bin/reipa.exe","$bin/reipa-bench.exe","$bin/reipa-gui.exe","README.md" -Destination $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
